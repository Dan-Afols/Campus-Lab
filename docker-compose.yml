version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: campuslab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  clamav:
    image: clamav/clamav:stable
    ports:
      - "3310:3310"

  api:
    image: node:22
    working_dir: /workspace/services/api
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./:/workspace
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
      - clamav

  ai-server:
    image: python:3.11
    working_dir: /workspace/services/ai-server
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8001"
    volumes:
      - ./:/workspace
    ports:
      - "8001:8001"

  nginx:
    image: nginx:1.27
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - ai-server

volumes:
  postgres_data:
